# Reference Forgejo workflow implementing the Arachne callback contract.
#
# Arachne (the spider) plucks this thread via the dispatch API and injects three
# inputs: build_id, arachne_callback, arachne_token. This workflow vibrates the
# thread back — one signal per runner block, then a final status.
#
# Block signal:  POST {callback}/signal   {step, status, output}   (X-Arachne-Token)
# Final signal:  POST {callback}/status   {status, artifacts}      (X-Arachne-Token)
#
# Copy this into each component repo as .forgejo/workflows/build.yml and adapt
# the actual build steps. The reporting plumbing stays the same.

name: build

on:
  workflow_dispatch:
    inputs:
      version:          { type: string,  required: true }
      release:          { type: string,  required: false, default: "dev" }
      branch:           { type: string,  required: false, default: "main" }
      debug:            { type: string,  required: false, default: "false" }
      build_id:         { type: string,  required: true }
      arachne_callback: { type: string,  required: true }
      arachne_token:    { type: string,  required: true }

jobs:
  build:
    runs-on: linux
    steps:
      - name: Prepare Arachne callback helpers
        id: arachne
        shell: bash
        run: |
          cat > arachne-signal.py <<'PY'
          import json
          import os
          import sys
          import urllib.request

          callback = os.environ["ARACHNE_CALLBACK"].rstrip("/")
          token = os.environ["ARACHNE_TOKEN"]
          endpoint = sys.argv[1]
          payload = json.loads(sys.stdin.read())

          req = urllib.request.Request(
              f"{callback}/{endpoint}",
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "X-Arachne-Token": token,
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              response.read()
          PY

          cat > arachne-run.sh <<'SH'
          #!/usr/bin/env bash
          set -o pipefail

          step="$1"
          shift
          log="arachne-${step}.log"

          {
            echo "TASK [${step}]"
            echo "command: $*"
            echo
            "$@"
          } 2>&1 | tee "$log"
          status=${PIPESTATUS[0]}

          if [ "$status" -eq 0 ]; then
            outcome="success"
          else
            outcome="failed"
          fi

          python3 - <<PY | python3 arachne-signal.py signal
          import json
          from pathlib import Path
          print(json.dumps({
              "step": ${step@Q},
              "status": ${outcome@Q},
              "output": Path(${log@Q}).read_text(errors="replace"),
          }, ensure_ascii=False))
          PY

          exit "$status"
          SH
          chmod +x arachne-run.sh

      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Report checkout
        if: always()
        shell: bash
        env:
          ARACHNE_CALLBACK: ${{ inputs.arachne_callback }}
          ARACHNE_TOKEN: ${{ inputs.arachne_token }}
        run: |
          python3 - <<PY | python3 arachne-signal.py signal
          import json
          print(json.dumps({
            "step": "checkout",
            "status": "${{ steps.checkout.outcome }}",
            "output": "TASK [checkout]\nchecked out ${{ inputs.branch }}"
          }))
          PY

      - name: Build
        id: build
        shell: bash
        env:
          APP_VERSION: ${{ inputs.version }}
          APP_RELEASE: ${{ inputs.release }}
          DEBUG_ENABLED: ${{ inputs.debug }}
          ARACHNE_CALLBACK: ${{ inputs.arachne_callback }}
          ARACHNE_TOKEN: ${{ inputs.arachne_token }}
        run: |
          ./arachne-run.sh build make VERSION="${{ inputs.version }}"

      - name: Upload artifact
        id: upload
        shell: bash
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USER }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          ARACHNE_CALLBACK: ${{ inputs.arachne_callback }}
          ARACHNE_TOKEN: ${{ inputs.arachne_token }}
        run: |
          ./arachne-run.sh upload bash -lc '
            ART="build/app-${{ inputs.version }}.tar.gz"
            URL="${{ vars.NEXUS_URL }}/repository/dev-artifacts/webapp/${{ inputs.version }}/webapp-${{ inputs.version }}.tar.gz"
            curl -fsS -u "$NEXUS_USER:$NEXUS_PASSWORD" --upload-file "$ART" "$URL"
            echo "url=$URL" >> "$GITHUB_OUTPUT"
          '

      - name: Settle thread
        if: always()
        shell: bash
        env:
          ARACHNE_CALLBACK: ${{ inputs.arachne_callback }}
          ARACHNE_TOKEN: ${{ inputs.arachne_token }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="success"
            ARTS="[{\"name\":\"webapp-${{ inputs.version }}.tar.gz\",\"type\":\"nexus\",\"download_url\":\"${{ steps.upload.outputs.url }}\"}]"
          else
            STATUS="failed"
            ARTS="[]"
          fi

          python3 - <<PY | python3 arachne-signal.py status
          import json
          print(json.dumps({
              "status": "$STATUS",
              "artifacts": $ARTS,
          }, ensure_ascii=False))
          PY

name: Update Arachne build

on:
  workflow_dispatch:
    inputs:
      deploy_dir:
        description: "Persistent Arachne checkout on the remote runner"
        required: true
        default: "/opt/arachne"
      compose_command:
        description: "Docker Compose command available on the runner"
        required: true
        default: "docker compose"

permissions:
  contents: read

concurrency:
  group: arachne-remote-build
  cancel-in-progress: false

jobs:
  update-build:
    name: Update build on remote runner
    runs-on:
      - self-hosted
      - arachne

    env:
      DEPLOY_DIR: ${{ inputs.deploy_dir }}
      DC: ${{ inputs.compose_command }}

    steps:
      - name: Update Arachne
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_DIR}"
          make update DC="${DC}"

      - name: Show service status
        if: always()
        shell: bash
        run: |
          set +e
          cd "${DEPLOY_DIR}"
          make ps DC="${DC}"

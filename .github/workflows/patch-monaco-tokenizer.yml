name: Patch Monaco YAML tokenizer

on:
  push:
    branches:
      - fix/monaco-yaml-tokenizer
    paths:
      - .github/workflows/patch-monaco-tokenizer.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/monaco-yaml-tokenizer
          fetch-depth: 0

      - name: Replace tokenizer block
        shell: python
        run: |
          from pathlib import Path

          path = Path("frontend/templates/admin/scenario_form.html")
          text = path.read_text(encoding="utf-8")

          old = r'''      monaco.languages.setMonarchTokensProvider("yaml", {
        tokenizer: {
          root: [
            [/^\s*#.*$/, "comment"],
            [/\$\{[^}]+\}/, "variable"],
            [/"([^"\\]|\\.)*"|'([^'\\]|\\.)*'/, "string"],
            [/\b(?:true|false|null|yes|no|on|off)\b/, "keyword"],
            [/-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?\b/, "number"],
            [/^(\s*-?\s*)([A-Za-z_][\w.-]*)(\s*:)/, ["", "key", ""]],
            [/[{}\[\],&*!|>?%@]/, "tag"]
          ]
        }
      });'''

          new = r'''      monaco.languages.setMonarchTokensProvider("yaml", {
        tokenizer: {
          root: [
            [/^\s*#.*$/, "comment"],
            [/^([ \t]*(?:-\s+)?)([A-Za-z_][\w.-]*)(\s*:)/, ["", "key", ""]],
            [/"/, "string.quote", "@doubleQuotedString"],
            [/'/, "string.quote", "@singleQuotedString"],
            [/#.*$/, "comment"],
            [/\$\{[^}\r\n]+\}/, "variable"],
            [/\b(?:true|false|null)\b(?=\s*(?:#.*)?$|[\],}])/i, "keyword"],
            [/~(?=\s*(?:#.*)?$|[\],}])/, "keyword"],
            [/-?(?:0|[1-9]\d*)(?:\.\d+)?(?:[eE][+-]?\d+)?(?=\s*(?:#.*)?$|[\],}])/, "number"],
            [/[{}\[\],&*!|>?%@]/, "tag"]
          ],
          doubleQuotedString: [
            [/\$\{[^}\r\n]+\}/, "variable"],
            [/\\(?:0|a|b|t|n|v|f|r|e| |\"|\/|\\|N|_|L|P|x[0-9a-fA-F]{2}|u[0-9a-fA-F]{4}|U[0-9a-fA-F]{8})/, "string.escape"],
            [/\\./, "invalid"],
            [/\"/, "string.quote", "@pop"],
            [/[^\\$\"]+/, "string"],
            [/./, "string"]
          ],
          singleQuotedString: [
            [/\$\{[^}\r\n]+\}/, "variable"],
            [/''/, "string.escape"],
            [/'/, "string.quote", "@pop"],
            [/[^'$]+/, "string"],
            [/./, "string"]
          ]
        }
      });'''

          if old not in text:
              raise SystemExit("Expected Monaco tokenizer block was not found; refusing to rewrite the file")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Commit patched template
        run: |
          rm .github/workflows/patch-monaco-tokenizer.yml
          git config user.name "Arachne Patch Bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/templates/admin/scenario_form.html .github/workflows/patch-monaco-tokenizer.yml
          git commit -m "fix: make Monaco YAML highlighting context-aware"
          git push origin HEAD:fix/monaco-yaml-tokenizer

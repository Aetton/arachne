{% extends "base.html" %}
{% block title %}Sign in · Arachne{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-20">
  <div class="text-center mb-8">
    <i class="ti ti-spider text-4xl accent"></i>
    <h1 class="text-2xl font-semibold mt-2">Arachne</h1>
  </div>
  <form method="post" action="/login" class="surface rounded-xl p-6 space-y-4">
    {% if error %}
    <div class="pill pill-fail block text-center py-2">{{ error }}</div>
    {% endif %}
    <div>
      <label class="block text-sm muted mb-1">Username</label>
      <input type="text" name="username" autofocus required>
    </div>
    <div>
      <label class="block text-sm muted mb-1">Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn w-full">Sign in</button>
  </form>
</div>
{% endblock %}

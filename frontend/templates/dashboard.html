{% extends "base.html" %}
{% block title %}Dashboard · Arachne{% endblock %}
{% block content %}
<style>
  .scenario-card {
    --scenario-accent: #6366f1;
    box-shadow: inset 3px 0 0 var(--scenario-accent);
  }
  .scenario-card .scenario-icon { color: var(--scenario-accent); }
  .scenario-accent-red { --scenario-accent: #ff5555; }
  .scenario-accent-orange { --scenario-accent: #ffb86c; }
  .scenario-accent-yellow { --scenario-accent: #f1fa8c; }
  .scenario-accent-green { --scenario-accent: #50fa7b; }
  .scenario-accent-teal { --scenario-accent: #4fd6be; }
  .scenario-accent-cyan { --scenario-accent: #8be9fd; }
  .scenario-accent-blue { --scenario-accent: #6ea8fe; }
  .scenario-accent-indigo { --scenario-accent: #6366f1; }
  .scenario-accent-purple { --scenario-accent: #bd93f9; }
  .scenario-accent-pink { --scenario-accent: #ff79c6; }
</style>

<h1 class="text-xl font-semibold mb-1">Scenarios</h1>
<p class="muted text-sm mb-5">Pick a build or deployment scenario to run.</p>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-10">
  {% for key, s in scenarios.items() %}
  <button hx-get="/scenarios/{{ key }}/form" hx-target="#panel" hx-swap="innerHTML"
          class="scenario-card scenario-accent-{{ s.accent or 'indigo' }} surface rounded-xl p-4 text-left hover:brightness-110 transition"
          style="border-color: var(--border);">
    <div class="flex items-center gap-2 mb-1.5">
      <i class="ti {{ s.icon or 'ti-box' }} text-lg scenario-icon"></i>
      <span class="font-medium">{{ s.label }}</span>
    </div>
    <p class="muted text-xs">{{ s.component }}</p>
  </button>
  {% endfor %}
</div>

<div id="panel"></div>

<div class="flex items-center justify-between mt-8 mb-3">
  <h2 class="text-lg font-semibold">Recent runs</h2>
  <button class="btn-ghost text-xs" hx-get="/runs/history" hx-target="#history" hx-swap="innerHTML">
    <i class="ti ti-refresh"></i> Refresh
  </button>
</div>
<div id="history" hx-get="/runs/history" hx-trigger="load, runStarted from:body delay:500ms">
</div>

{% endblock %}
